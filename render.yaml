services:
  - type: web
    name: gym-progress-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.3"
      - key: DATABASE_URL
        fromDatabase:
          name: gym-progress-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: "https://gym-progress-frontend.onrender.com"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "10080"

  - type: web
    name: gym-progress-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "echo 'static site, no build needed'"
    staticPublishPath: .
    envVars: []

databases:
  - name: gym-progress-db
    plan: free
