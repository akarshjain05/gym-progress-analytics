<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1e2327">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="IRONLOG">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="shortcut icon" href="/icons/icon-96.png">
  <link rel="stylesheet" href="css/theme.css?v=31">
  <link rel="stylesheet" href="css/style.css?v=31">
  <link rel="stylesheet" href="css/mobile.css?v=31">
  <link rel="stylesheet" href="css/polish.css?v=31">
  <title>Calculators — IRONLOG</title>
  <style>
    .calculators-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }
    .calc-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .calc-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .calc-header svg {
      width: 24px;
      height: 24px;
      color: var(--accent);
    }
    .calc-header h2 {
      margin: 0;
      font-size: 1.2rem;
      font-weight: 700;
    }
    .calc-body {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .calc-row {
      display: flex;
      gap: 1rem;
    }
    .calc-row > * {
      flex: 1;
    }
    .calc-result {
      background: var(--bg-body);
      border-radius: 12px;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .result-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.95rem;
    }
    .result-value {
      font-weight: 700;
      color: var(--accent);
      font-size: 1.1rem;
    }
    .plate-display {
      display: flex;
      gap: 0.25rem;
      justify-content: center;
      align-items: center;
      padding: 1rem 0;
      min-height: 80px;
    }
    .plate {
      width: 12px;
      border-radius: 2px;
      background: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--bg-surface);
      font-weight: 800;
      font-size: 0.65rem;
      writing-mode: vertical-rl;
      text-orientation: mixed;
    }
    .plate-25 { height: 60px; background: #e74c3c; }
    .plate-20 { height: 60px; background: #3498db; }
    .plate-15 { height: 50px; background: #f1c40f; }
    .plate-10 { height: 40px; background: #2ecc71; }
    .plate-5 { height: 30px; background: #ecf0f1; color: #333; }
    .plate-2-5 { height: 25px; background: #95a5a6; }
    .plate-1-25 { height: 20px; background: #7f8c8d; }
    .bar-end {
      width: 20px;
      height: 12px;
      background: #7f8c8d;
      border-radius: 2px;
      margin-left: 5px;
    }
  </style>
</head>
<body>
  <script src="js/config.js?v=31"></script>
  <script src="js/api.js?v=31"></script>
  <script src="js/features.js?v=31"></script>
  <script src="js/layout.js?v=31"></script>
  <script src="js/skeleton.js?v=31"></script>
  <script src="js/calculators.js?v=31"></script>
  <script src="js/pwa.js?v=31"></script>
</body>
</html>
